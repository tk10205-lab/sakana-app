<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魚図鑑 AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #e0eaff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(135deg, #0d2137, #1a4a6b);
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,150,255,0.2);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #7dd3fc; }
    header p  { font-size: 0.8rem; color: #94a3b8; margin-top: 3px; }

    .container { width: 100%; max-width: 480px; padding: 16px; flex: 1; }

    /* API Key */
    .api-key-section {
      background: #132338; border: 1px solid #1e3a52;
      border-radius: 12px; padding: 14px; margin-bottom: 16px;
    }
    .api-key-section label { font-size: 0.78rem; color: #94a3b8; display: block; margin-bottom: 7px; }
    .api-key-row { display: flex; gap: 8px; }
    .api-key-row input {
      flex: 1; background: #0a1628; border: 1px solid #2a4a6a;
      border-radius: 8px; padding: 9px 12px; color: #e0eaff;
      font-size: 0.85rem; font-family: monospace; outline: none;
    }
    .api-key-row input:focus { border-color: #3b82f6; }
    .btn-save {
      background: #1d4ed8; color: white; border: none; border-radius: 8px;
      padding: 9px 14px; font-size: 0.85rem; cursor: pointer;
    }
    .key-status { font-size: 0.73rem; margin-top: 5px; color: #94a3b8; }
    .key-status.ok { color: #4ade80; }

    /* Mode Toggle */
    .mode-toggle {
      display: flex; gap: 6px; margin-bottom: 14px;
      background: #0d1f33; border-radius: 12px; padding: 4px;
    }
    .mode-btn {
      flex: 1; padding: 9px; border: none; border-radius: 9px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      background: transparent; color: #64748b; transition: all 0.2s;
    }
    .mode-btn.active { background: #1d4ed8; color: white; }

    /* ═══ VIDEO MODE ═══ */
    .video-wrapper {
      position: relative; border-radius: 16px; overflow: hidden;
      background: #0d1f33; margin-bottom: 12px;
      aspect-ratio: 4/3;
    }
    #camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .video-placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: #475569;
    }
    .video-placeholder span { font-size: 3rem; }
    .video-placeholder p { font-size: 0.82rem; }

    /* Countdown ring */
    .countdown-ring {
      position: absolute; top: 10px; left: 10px;
      width: 52px; height: 52px; display: none;
    }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring circle {
      fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 4;
    }
    .countdown-ring .progress {
      stroke: #0ea5e9; stroke-width: 4;
      stroke-dasharray: 132; stroke-dashcap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-text {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: white;
    }

    /* Live fish name overlay */
    .fish-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 20px 14px 12px;
      display: none;
    }
    .fish-overlay-name {
      font-size: 1.4rem; font-weight: 700; color: #7dd3fc;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
      transition: opacity 0.3s;
    }
    .fish-overlay-sub {
      font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 2px;
    }

    /* Scanning pulse ring around video */
    .video-wrapper.scanning::after {
      content: ''; position: absolute; inset: 0; border-radius: 16px;
      border: 2px solid #0ea5e9;
      animation: scanPulse 1.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes scanPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Detected list (during recording) */
    .live-list {
      position: absolute; top: 10px; right: 10px;
      display: flex; flex-direction: column; gap: 4px; max-width: 140px;
    }
    .live-tag {
      background: rgba(14,165,233,0.85); color: white;
      font-size: 0.72rem; font-weight: 600; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
      animation: tagPop 0.3s ease;
    }
    @keyframes tagPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Buttons */
    .btn-rec {
      width: 100%; border: none; border-radius: 12px; padding: 15px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 6px; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-rec:active { transform: scale(0.98); }
    .btn-rec:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-rec.start { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }
    .btn-rec.stop  { background: linear-gradient(135deg, #6b7280, #4b5563); color: white; }

    .rec-dot {
      width: 12px; height: 12px; background: white; border-radius: 50%;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    .hint { font-size: 0.73rem; color: #475569; text-align: center; margin-bottom: 14px; }

    /* Summary */
    #summary {
      background: #132338; border: 1px solid #1e3a52;
      border-radius: 16px; padding: 18px; display: none; margin-bottom: 16px;
    }
    #summary.visible { display: block; }
    .summary-title {
      font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px;
      border-bottom: 1px solid #1e3a52; padding-bottom: 10px;
    }
    .summary-title strong { color: #7dd3fc; font-size: 1rem; }
    .fish-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .fish-list li {
      display: flex; align-items: center; gap: 10px;
      background: #0d1f33; border-radius: 10px; padding: 10px 14px;
    }
    .fish-list li .num {
      background: #1d4ed8; color: white; border-radius: 50%;
      width: 22px; height: 22px; font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .fish-list li .name { font-size: 0.95rem; color: #e0eaff; font-weight: 600; }
    .fish-list li .count { margin-left: auto; font-size: 0.75rem; color: #64748b; }
    .no-fish { color: #64748b; font-size: 0.85rem; text-align: center; padding: 12px; }

    /* Photo mode */
    .capture-area {
      background: #132338; border: 2px dashed #2a4a6a; border-radius: 16px;
      padding: 30px 20px; text-align: center; cursor: pointer;
      transition: border-color 0.2s; position: relative; overflow: hidden; margin-bottom: 14px;
    }
    .capture-area:hover { border-color: #3b82f6; }
    .capture-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .capture-area h2 { font-size: 1rem; color: #7dd3fc; margin-bottom: 6px; }
    .capture-area p { font-size: 0.8rem; color: #64748b; }

    #photo-preview-container { display: none; margin-bottom: 14px; position: relative; }
    #preview-img { width: 100%; border-radius: 12px; display: block; max-height: 280px; object-fit: cover; }
    .btn-clear {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6);
      color: white; border: none; border-radius: 50%; width: 30px; height: 30px;
      font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .btn-identify {
      width: 100%; background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white; border: none; border-radius: 12px; padding: 15px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      display: none; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px;
    }
    .btn-identify.visible { display: flex; }
    .btn-identify:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #photo-result {
      background: #132338; border: 1px solid #1e3a52;
      border-radius: 16px; padding: 18px; display: none; margin-bottom: 16px;
    }
    #photo-result.visible { display: block; }
    .result-body { font-size: 0.9rem; line-height: 1.8; color: #cbd5e1; white-space: pre-wrap; }

    .error-box {
      background: #2d1515; border: 1px solid #7f1d1d; border-radius: 12px;
      padding: 14px; color: #fca5a5; font-size: 0.83rem; margin-bottom: 12px; display: none;
    }
    .error-box.visible { display: block; }

    footer { padding: 14px; text-align: center; font-size: 0.72rem; color: #374151; }
  </style>
</head>
<body>

<header>
  <h1>🐟 魚図鑑 AI</h1>
  <p>動画で魚をリアルタイム識別</p>
</header>

<div class="container">

  <!-- API Key -->
  <div class="api-key-section">
    <label>Anthropic API キー</label>
    <div class="api-key-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <button class="btn-save" onclick="saveApiKey()">保存</button>
    </div>
    <div class="key-status" id="key-status">APIキーを入力してください</div>
  </div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button id="btn-mode-video" class="mode-btn active" onclick="switchMode('video')">📹 ライブ識別</button>
    <button id="btn-mode-photo" class="mode-btn" onclick="switchMode('photo')">🖼️ 写真</button>
  </div>

  <!-- ═══ VIDEO MODE ═══ -->
  <div id="video-mode">
    <div class="video-wrapper" id="video-wrapper">
      <video id="camera-video" autoplay playsinline muted></video>

      <div class="video-placeholder" id="video-placeholder">
        <span>🎥</span>
        <p>下のボタンで録画開始</p>
      </div>

      <!-- Countdown ring -->
      <div class="countdown-ring" id="countdown-ring">
        <svg viewBox="0 0 44 44" width="52" height="52">
          <circle cx="22" cy="22" r="21"/>
          <circle class="progress" id="ring-progress" cx="22" cy="22" r="21"/>
        </svg>
        <div class="countdown-text" id="countdown-text">10</div>
      </div>

      <!-- Live tags (top-right) -->
      <div class="live-list" id="live-list"></div>

      <!-- Fish name overlay (bottom) -->
      <div class="fish-overlay" id="fish-overlay">
        <div class="fish-overlay-name" id="overlay-name">—</div>
        <div class="fish-overlay-sub" id="overlay-sub">解析中...</div>
      </div>
    </div>

    <!-- Buttons -->
    <button class="btn-rec start" id="btn-rec" onclick="toggleRecording()">
      ● 録画開始（10秒）
    </button>
    <p class="hint" id="rec-hint">撮影しながら魚名をリアルタイム表示 → 終了後に一覧表示</p>

    <!-- Summary -->
    <div id="summary">
      <div class="summary-title">📋 検出された魚 <strong id="summary-count"></strong></div>
      <ul class="fish-list" id="fish-list"></ul>
    </div>
  </div>

  <!-- ═══ PHOTO MODE ═══ -->
  <div id="photo-mode" style="display:none">
    <div class="capture-area">
      <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFile(event)">
      <div style="font-size:2.5rem;margin-bottom:8px">📷</div>
      <h2>魚の写真を撮影 / 選択</h2>
      <p>タップしてカメラを起動するか<br>写真ライブラリから選んでください</p>
    </div>
    <div id="photo-preview-container">
      <img id="preview-img" src="" alt="プレビュー">
      <button class="btn-clear" onclick="clearImage()">✕</button>
    </div>
    <button class="btn-identify" id="btn-identify" onclick="identifyPhoto()">
      <span id="btn-text">🔍 この魚を調べる</span>
      <div class="spinner" id="photo-spinner" style="display:none"></div>
    </button>
    <div id="photo-result">
      <div class="result-body" id="photo-result-body"></div>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

</div>

<footer>Powered by Claude claude-opus-4-6 Vision API</footer>

<script>
  // ── State ─────────────────────────────────────────────
  let videoStream   = null;
  let isRecording   = false;
  let recInterval   = null;
  let countdownTimer = null;
  let secondsLeft   = 10;
  let detections    = [];   // [{name, count}]
  let pendingCall   = false;

  const DURATION    = 10;   // seconds
  const SCAN_EVERY  = 2500; // ms between frames

  // ── API Key ───────────────────────────────────────────
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) { document.getElementById('api-key-input').value = saved; updateKeyStatus(true); }
  });

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('sk-ant-')) { updateKeyStatus(false, '有効なAPIキーを入力してください'); return; }
    localStorage.setItem('anthropic_api_key', key);
    updateKeyStatus(true);
  }

  function updateKeyStatus(ok, msg) {
    const el = document.getElementById('key-status');
    el.textContent = ok ? '✓ APIキーが設定されています' : (msg || 'APIキーを入力してください');
    el.className = 'key-status' + (ok ? ' ok' : '');
  }

  function getApiKey() {
    return localStorage.getItem('anthropic_api_key') ||
           document.getElementById('api-key-input').value.trim();
  }

  // ── Mode ─────────────────────────────────────────────
  function switchMode(mode) {
    document.getElementById('btn-mode-video').classList.toggle('active', mode === 'video');
    document.getElementById('btn-mode-photo').classList.toggle('active', mode === 'photo');
    document.getElementById('video-mode').style.display = mode === 'video' ? 'block' : 'none';
    document.getElementById('photo-mode').style.display  = mode === 'photo' ? 'block' : 'none';
    hideError();
    if (mode === 'photo' && isRecording) stopRecording();
    if (mode === 'photo' && videoStream) stopCamera();
  }

  // ── Camera ────────────────────────────────────────────
  async function startCamera() {
    try {
      videoStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
      });
      const v = document.getElementById('camera-video');
      v.srcObject = videoStream;
      document.getElementById('video-placeholder').style.display = 'none';
    } catch (e) {
      showError('カメラ起動失敗: ' + e.message);
      throw e;
    }
  }

  function stopCamera() {
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    document.getElementById('camera-video').srcObject = null;
    document.getElementById('video-placeholder').style.display = 'flex';
  }

  // ── Recording ─────────────────────────────────────────
  async function toggleRecording() {
    if (isRecording) { stopRecording(); return; }
    if (!getApiKey()) { showError('APIキーを入力して「保存」を押してください。'); return; }
    hideError();
    hideSummary();
    if (!videoStream) { await startCamera(); await sleep(800); }
    startRecording();
  }

  function startRecording() {
    isRecording  = true;
    secondsLeft  = DURATION;
    detections   = [];
    pendingCall  = false;

    // UI
    const btn = document.getElementById('btn-rec');
    btn.className = 'btn-rec stop';
    btn.innerHTML = '<div class="rec-dot"></div> 録画中... 停止';
    document.getElementById('rec-hint').textContent = '魚をカメラに向けてください';
    document.getElementById('video-wrapper').classList.add('scanning');
    document.getElementById('live-list').innerHTML = '';

    showOverlay('スキャン中...', '');
    startCountdown();

    // Periodic frame capture
    recInterval = setInterval(() => {
      if (!pendingCall) sendFrame();
    }, SCAN_EVERY);

    // Send first frame immediately
    sendFrame();
  }

  function stopRecording() {
    isRecording = false;
    clearInterval(recInterval);
    clearInterval(countdownTimer);

    document.getElementById('btn-rec').className = 'btn-rec start';
    document.getElementById('btn-rec').innerHTML = '● 録画開始（10秒）';
    document.getElementById('rec-hint').textContent = '撮影しながら魚名をリアルタイム表示 → 終了後に一覧表示';
    document.getElementById('video-wrapper').classList.remove('scanning');
    document.getElementById('countdown-ring').style.display = 'none';
    document.getElementById('fish-overlay').style.display = 'none';

    showSummary();
  }

  // ── Countdown ─────────────────────────────────────────
  function startCountdown() {
    const ring = document.getElementById('countdown-ring');
    const text = document.getElementById('countdown-text');
    const progress = document.getElementById('ring-progress');
    const circumference = 2 * Math.PI * 21; // ≈132

    ring.style.display = 'block';
    text.textContent = secondsLeft;
    progress.style.strokeDashoffset = 0;

    countdownTimer = setInterval(() => {
      secondsLeft--;
      text.textContent = secondsLeft;
      const offset = circumference * (1 - secondsLeft / DURATION);
      progress.style.strokeDashoffset = offset;

      if (secondsLeft <= 0) {
        clearInterval(countdownTimer);
        stopRecording();
      }
    }, 1000);
  }

  // ── Frame capture & API ───────────────────────────────
  function captureFrame() {
    const video = document.getElementById('camera-video');
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  }

  async function sendFrame() {
    if (!isRecording || pendingCall) return;
    pendingCall = true;
    const b64 = captureFrame();

    try {
      const name = await askFishName(b64);
      if (name) {
        updateOverlay(name);
        addDetection(name);
      }
    } catch (e) {
      // silent: keep recording even on API error
    } finally {
      pendingCall = false;
    }
  }

  async function askFishName(b64) {
    const apiKey = getApiKey();
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 30,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text',  text: '画像の魚の和名だけを答えてください。魚が映っていなければ「なし」とだけ答えてください。説明不要。' }
          ]
        }]
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '').trim();
    return raw === 'なし' || raw === '' ? null : raw;
  }

  // ── Overlay ───────────────────────────────────────────
  function showOverlay(name, sub) {
    const overlay = document.getElementById('fish-overlay');
    overlay.style.display = 'block';
    document.getElementById('overlay-name').textContent = name;
    document.getElementById('overlay-sub').textContent  = sub || '';
  }

  function updateOverlay(name) {
    const nameEl = document.getElementById('overlay-name');
    nameEl.style.opacity = '0';
    setTimeout(() => {
      nameEl.textContent = name;
      nameEl.style.opacity = '1';
    }, 150);
    document.getElementById('overlay-sub').textContent = '識別済み';
    document.getElementById('fish-overlay').style.display = 'block';
  }

  // ── Detection list ────────────────────────────────────
  function addDetection(name) {
    const existing = detections.find(d => d.name === name);
    if (existing) { existing.count++; return; }
    detections.push({ name, count: 1 });

    // Live tag in top-right
    const list = document.getElementById('live-list');
    const tag = document.createElement('div');
    tag.className = 'live-tag';
    tag.textContent = name;
    list.appendChild(tag);
    // Keep max 4 tags visible
    while (list.children.length > 4) list.removeChild(list.firstChild);
  }

  // ── Summary ───────────────────────────────────────────
  function showSummary() {
    const summary = document.getElementById('summary');
    const list    = document.getElementById('fish-list');
    const count   = document.getElementById('summary-count');

    list.innerHTML = '';

    // Sort by count desc
    const sorted = [...detections].sort((a, b) => b.count - a.count);
    const unique = sorted.filter((d, i, arr) => arr.findIndex(x => x.name === d.name) === i);

    if (unique.length === 0) {
      list.innerHTML = '<li class="no-fish">魚は検出されませんでした</li>';
      count.textContent = '（0種）';
    } else {
      count.textContent = `（${unique.length}種）`;
      unique.forEach((d, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="num">${i + 1}</span>
          <span class="name">🐟 ${d.name}</span>
          <span class="count">${d.count}回検出</span>`;
        list.appendChild(li);
      });
    }
    summary.classList.add('visible');
  }

  function hideSummary() {
    document.getElementById('summary').classList.remove('visible');
    document.getElementById('live-list').innerHTML = '';
  }

  // ── Photo Mode ────────────────────────────────────────
  let photoBase64 = null;

  function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      photoBase64 = e.target.result.split(',')[1];
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('photo-preview-container').style.display = 'block';
      document.getElementById('btn-identify').classList.add('visible');
      document.getElementById('photo-result').classList.remove('visible');
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    photoBase64 = null;
    document.getElementById('file-input').value = '';
    document.getElementById('photo-preview-container').style.display = 'none';
    document.getElementById('btn-identify').classList.remove('visible');
    document.getElementById('photo-result').classList.remove('visible');
  }

  async function identifyPhoto() {
    if (!getApiKey()) { showError('APIキーを入力してください。'); return; }
    if (!photoBase64) { showError('写真を選択してください。'); return; }

    const btn = document.getElementById('btn-identify');
    const txt = document.getElementById('btn-text');
    const sp  = document.getElementById('photo-spinner');
    btn.disabled = true; sp.style.display = 'block'; txt.textContent = '解析中...';
    hideError();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': getApiKey(),
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 800,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: photoBase64 } },
              { type: 'text',  text: 'この画像の魚を識別してください。\n\n【魚の名前】\n【特徴】\n【生息地】\n【豆知識】\n\nの順で答えてください。魚がいなければその旨を。' }
            ]
          }]
        })
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || res.status); }
      const data = await res.json();
      document.getElementById('photo-result-body').textContent = data.content?.[0]?.text || '';
      document.getElementById('photo-result').classList.add('visible');
    } catch (e) {
      showError('エラー: ' + e.message);
    } finally {
      btn.disabled = false; sp.style.display = 'none'; txt.textContent = '🔍 この魚を調べる';
    }
  }

  // ── Helpers ───────────────────────────────────────────
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg; el.classList.add('visible');
  }

  function hideError() { document.getElementById('error-box').classList.remove('visible'); }
</script>
</body>
</html>
